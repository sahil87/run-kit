# run-kit tmux configuration
# Loaded via: tmux -L runkit -f config/tmux.conf

# --- General ---
set -g default-terminal "tmux-256color"
set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# --- Prefix (explicit default) ---
set -g prefix C-b

# --- Status bar: dark theme ---
set -g status on
set -g status-style "bg=#0f1117,fg=#e8eaf0"
set -g status-left " #[fg=#5b8af0,bold]#S #[default]"
set -g status-left-length 30
set -g status-right " #[fg=#e8eaf0]#h  %H:%M "
set -g status-right-length 40

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#0f1117,bg=#5b8af0,bold] #I:#W #[default]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#2a2d37"
set -g pane-active-border-style "fg=#5b8af0"

# --- Keybindings (byobu-style) ---
bind -n F2 new-window
bind -n F3 previous-window
bind -n F4 next-window

# Pane management
bind | split-window -h
bind - split-window -v
bind -n S-F3 select-pane -t :.-
bind -n S-F4 select-pane -t :.+

# Rename window
bind -n F8 command-prompt -I "#W" "rename-window -- '%%'"

# Scrollback / copy mode
bind -n S-F7 copy-mode

agent:
    spawn_command: claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"
checklist:
    extra_categories: []
fab_version: 2.0.1
project:
    description: Web based agent orchestration framework
    name: run-kit
review_tools:
    claude: true
    codex: true
    copilot: true
source_paths:
    - app/backend/
    - app/frontend/src/
stage_directives:
    apply:
        - Use GIVEN/WHEN/THEN for scenarios
        - Mark ambiguities with [NEEDS CLARIFICATION]
    hydrate: []
    intake: []
    review: []
true_impact_exclude:
    - fab/
    - docs/

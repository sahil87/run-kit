name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/backend/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: cd app/frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd app/frontend && pnpm build

      - name: Copy frontend dist to backend
        run: |
          rm -rf app/backend/frontend/dist
          cp -r app/frontend/dist app/backend/frontend/dist

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile
        run: |
          cd app/backend
          mkdir -p ../../dist
          targets="darwin/arm64 darwin/amd64 linux/arm64 linux/amd64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="run-kit-${os}-${arch}"
            echo "Building ${output}..."
            mkdir -p "../../dist/${output}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" \
              -o "../../dist/${output}/run-kit" ./cmd/run-kit
            tar -czf "../../dist/${output}.tar.gz" -C "../../dist/${output}" run-kit
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"

          # Compute SHA256 for each tarball
          sha_darwin_arm64=$(sha256sum dist/run-kit-darwin-arm64.tar.gz | cut -d' ' -f1)
          sha_darwin_amd64=$(sha256sum dist/run-kit-darwin-amd64.tar.gz | cut -d' ' -f1)
          sha_linux_arm64=$(sha256sum dist/run-kit-linux-arm64.tar.gz | cut -d' ' -f1)
          sha_linux_amd64=$(sha256sum dist/run-kit-linux-amd64.tar.gz | cut -d' ' -f1)

          # Clone the tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/wvrdz/homebrew-tap.git" /tmp/homebrew-tap

          # Generate the formula
          cat > /tmp/homebrew-tap/Formula/run-kit.rb << EOF
          class RunKit < Formula
            desc "Tmux session manager with web UI"
            homepage "https://github.com/wvrdz/run-kit"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/wvrdz/run-kit/releases/download/v#{version}/run-kit-darwin-arm64.tar.gz"
                sha256 "${sha_darwin_arm64}"
              else
                url "https://github.com/wvrdz/run-kit/releases/download/v#{version}/run-kit-darwin-amd64.tar.gz"
                sha256 "${sha_darwin_amd64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/wvrdz/run-kit/releases/download/v#{version}/run-kit-linux-arm64.tar.gz"
                sha256 "${sha_linux_arm64}"
              else
                url "https://github.com/wvrdz/run-kit/releases/download/v#{version}/run-kit-linux-amd64.tar.gz"
                sha256 "${sha_linux_amd64}"
              end
            end

            def install
              bin.install "run-kit"
            end

            test do
              assert_match "run-kit version", shell_output("#{bin}/run-kit version")
            end
          end
          EOF

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/homebrew-tap/Formula/run-kit.rb

          # Commit and push
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/run-kit.rb
          git commit -m "run-kit ${version}"
          git push

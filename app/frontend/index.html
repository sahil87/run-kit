<!DOCTYPE html>
<html lang="en" data-theme="dark" class="fullbleed">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
    <title>RunKit</title>
    <meta name="description" content="Web-based agent orchestration dashboard" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="apple-touch-icon" href="/generated-icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Blocking theme initialization — runs before first paint to prevent flicker.
      // Reads user preference from localStorage and resolves to "dark" or "light".
      ;(function() {
        var pref = null;
        try { pref = localStorage.getItem("runkit-theme"); } catch(e) {}
        if (pref !== "light" && pref !== "dark" && pref !== "system") pref = "system";
        var resolved = pref;
        if (pref === "system") {
          resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = resolved;
        // Instance-accent tint (paint cache): the runtime echoes the resolved
        // accent's theme-color hex to localStorage on every load, so an
        // installed PWA window opens already tinted (no flash). Malformed or
        // absent echo falls back to the per-mode defaults; the runtime
        // resolution corrects/rewrites both the meta tag and the echo.
        var tint = null;
        try {
          var echo = JSON.parse(localStorage.getItem("runkit-instance-color"));
          if (echo && typeof echo.hex === "string" && /^#[0-9a-fA-F]{6}$/.test(echo.hex)) tint = echo.hex;
        } catch(e) {}
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute('content', tint || (resolved === 'dark' ? '#0f1117' : '#f8f9fb'));
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/generated-icons/favicon.svg" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/MonaspiceNeNerdFontMono-Regular.woff2" />
  </head>
  <body class="h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

unbind C-b
set -g prefix C-s
bind-key -r C-s send-prefix

if-shell 'test -x /home/linuxbrew/.linuxbrew/bin/zsh' 'set-option -g default-shell /home/linuxbrew/.linuxbrew/bin/zsh' 'set-option -g default-shell /bin/zsh'
set-option -g set-titles on
set-option -g set-titles-string '#T'

set -g mouse on

# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


bind C-l send-keys 'C-l'
bind C-k send-keys 'C-k'

set-option -g default-terminal "screen-256color"
set-option -g status-keys vi
set-option -g status-left-length 50

set-option -g status-right "#{prefix_highlight} #(date '+%a, %b %d - %I:%M')"

bind-key - split-window -v  -c '#{pane_current_path}'
bind-key / split-window -h  -c '#{pane_current_path}'

bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1

bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5

bind c new-window -c '#{pane_current_path}'

set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind-key b break-pane -d

#bind-key C-j choose-tree

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
#bind-key -t vi-copy v begin-selection
#bind-key -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Update default binding of `Enter` to also use copy-pipe
#unbind -t vi-copy Enter
#bind-key -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"

bind-key h split-window -h "htop"
bind-key b split-window -h "btop"
bind-key t split-window -h -c ~/ "vim todo.md"
bind-key g split-window -h "jj-fzf"
bind-key C split-window -h -c '#{pane_current_path}' "claude --dangerously-skip-permissions"
#bind-key l split-window -h -c ~/ "ssh -i ~/.ssh/cdex-mumbai-development.pem -o ProxyCommand='ssh -W %h:%p ubuntu@13.232.76.240' ubuntu@172.31.2.19 'pm2 logs 33'"
# sesh — smart session switcher (zoxide + tmux sessions + config)
bind-key T display-popup -E -w 60% -h 50% "sesh connect \$(sesh list | fzf --reverse --prompt='session> ')"

# Legacy session switcher (keeping as fallback)
bind C-j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# fzf join-pane — pick a session:window and join it as a split
bind-key j display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | grep -v \"^$(tmux display-message -p '#{session_name}:#{window_index}') \" | fzf --reverse --prompt='join-pane> ' | awk '{print \$1}' | xargs -I{} tmux join-pane -h -s {}"
bind-key w command-prompt -p "move window to: "  "move-window -t '%%'"
bind-key p command-prompt -p "move pane to: "  "move-pane -t '%%'"


# fzf SSH picker — reads from ~/dotfiles/tmux/ssh-hosts
bind-key S display-popup -E "cat ~/dotfiles/tmux/ssh-hosts | fzf --reverse --prompt='ssh> ' | sed 's/.*| //' | xargs -I{} tmux new-window -n 'ssh' {}"

# fzf process killer — browse processes, kill selected
bind-key X display-popup -E "ps -eo pid,user,%cpu,%mem,command | tail -n +2 | fzf --reverse --multi --prompt='kill> ' --header='Select process(es) to kill' | awk '{print \$1}' | xargs -r kill"

# fzf dotfile editor — browse and edit dotfiles
bind-key e display-popup -E "cd ~/dotfiles && git ls-files | fzf --reverse --prompt='edit> ' --preview='head -50 ~/dotfiles/{}' | xargs -I{} tmux new-window -n 'edit' vim ~/dotfiles/{}"

# fzf git branch switcher — pick a branch and checkout
bind-key G display-popup -E "git branch --all --sort=-committerdate | sed 's/^[* ]*//' | sed 's|remotes/origin/||' | sort -u | fzf --reverse --prompt='branch> ' | xargs -I{} tmux send-keys 'git checkout {}' C-m"

# fzf worktree picker — jump to a worktree in a new window
bind-key W display-popup -E "git worktree list | fzf --reverse --prompt='worktree> ' | awk '{print \$1}' | xargs -I{} tmux new-window -c {} -n '$(basename {})'"

# Scratchpad — quick vim note in a popup
bind-key N display-popup -E -w 80% -h 75% "vim ~/scratchpad.md"

# Keybinding cheatsheet — show all custom bindings
bind-key ? display-popup -E -w 60% -h 75% "cat <<'CHEAT' | fzf --reverse --prompt='bindings> ' --header='tmux custom keybindings'
prefix + j     → fzf join-pane
prefix + S     → fzf SSH picker
prefix + C-j   → fzf session switcher
prefix + F     → tmux-fzf command palette
prefix + X     → fzf process killer
prefix + e     → fzf dotfile editor
prefix + G     → fzf git branch switcher
prefix + W     → fzf worktree picker
prefix + N     → scratchpad (vim)
prefix + C     → claude (dangerous mode) in vertical split
prefix + T     → sesh session switcher (zoxide-powered)
prefix + ?     → this cheatsheet
prefix + b     → break pane to window
prefix + w     → move window to session
prefix + p     → move pane to target
prefix + s     → swap pane
prefix + -     → split vertical
prefix + /     → split horizontal
prefix + M-s   → capture current pane
prefix + M-a   → capture all panes
prefix + K     → kill session
prefix + C-b   → tat && exit
CHEAT"

#Easily swap a pane (targeted by pane number) with the current pane
bind-key s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"

bind-key C-b send-keys 'tat && exit' 'C-m'
bind-key K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'

# ── Claude Code TUI Compatibility ────────────────────────────────────────
# (cherry-picked from github.com/sethdford/tmux-claude-code)

# Eliminates flicker — DEC 2026 synchronized output
set -gq allow-passthrough on
set -as terminal-features ',xterm-256color:sync'

# Modifier key combos (Ctrl+Shift+key etc.) in TUI apps
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Zero escape delay — removes 500ms lag on Escape (huge for vim)
set -sg escape-time 0

# OSC 52 clipboard — works across SSH and nested tmux
set -g set-clipboard on

# 250k scrollback — Claude streams 4,000-6,700 scroll events/sec
set -g history-limit 250000

# Focus events — proper TUI focus tracking
set -g focus-events on

# Blinking cursor (works in regular terminals, not Claude Code)
set -g cursor-style blinking-block
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[1 q'

# True color support for modern terminals
set -ag terminal-overrides ",xterm-256color:RGB:Tc"
set -ag terminal-overrides ",xterm-ghostty:RGB:Tc"
set -ag terminal-overrides ",xterm-kitty:RGB:Tc"
set -ag terminal-overrides ",alacritty:RGB:Tc"
set -ag terminal-overrides ",iTerm2*:RGB:Tc"

# Heavy pane border lines for better visibility
set -g pane-border-lines heavy

# Active pane visibility
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39,bold'
set -g window-style 'fg=colour245,bg=default'
set -g window-active-style 'fg=colour255,bg=default'

# Pane status bar at top — active pane gets a bright banner
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bg=colour39#,fg=colour0#,bold] #P: #{pane_current_command} #[bg=colour235#,fg=colour39] #{pane_current_path} #[bg=colour214#,fg=colour0#,bold] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo "no-git") #[bg=colour204#,fg=colour255#,bold]#(cd #{pane_current_path} && git rev-parse --show-toplevel 2>/dev/null | grep -q "\.worktrees\|worktrees" && echo " wt " || echo "") ,#[fg=colour245] #P: #{pane_current_command} }'

# ── Capture Panes ────────────────────────────────────────────────────────

# prefix + M-s — capture current pane scrollback to file
bind M-s run-shell "tmux capture-pane -pS - > /tmp/tmux-pane-#{pane_title}-$(date +%s).txt && tmux display-message 'Captured #{pane_title} to /tmp/'"

# prefix + M-a — capture ALL panes in current window
bind M-a run-shell "\
  for pane_id in $(tmux list-panes -F '##{pane_id}'); do \
    title=$(tmux display-message -t \$pane_id -p '##{pane_title}'); \
    tmux capture-pane -t \$pane_id -pS - > /tmp/tmux-pane-\${title:-\$pane_id}-$(date +%s).txt; \
  done && tmux display-message 'Captured all panes to /tmp/'"

# ── Plugins (via TPM) ───────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# tmux-fzf: universal command palette
set -g @tmux-fzf-launch-key 'C-f'
TMUX_FZF_OPTIONS="-p -w 60% -h 50%"
TMUX_FZF_PREVIEW=0

# Resurrect: persist pane content + nvim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at very bottom)
run-shell '~/.tmux/plugins/tpm/tpm'
# run-kit tmux configuration — byobu flavor
# Replicates byobu's F-key workflow, Ctrl-A prefix, status bar style,
# and screen-like bindings without depending on byobu scripts/binaries.

# --- General ---
set -g default-terminal "tmux-256color"
set -g mouse on
set -s escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -g display-panes-time 150
set -g clock-mode-style 24
set -g aggressive-resize on
set -g monitor-activity on
set -g automatic-rename on
set -g mode-keys vi

# --- Prefix: Ctrl-A (byobu/screen style) ---
unbind C-b
set -g prefix C-a
bind C-a last-window
bind a send-prefix

# --- Byobu color scheme ---
# BYOBU_DARK="#333333"  BYOBU_LIGHT="#EEEEEE"
# BYOBU_ACCENT="#75507B"  BYOBU_HIGHLIGHT="#DD4814"

# --- Status bar (byobu-style single line) ---
set -g status on
set -g status-interval 1
set -g status-style "bg=#333333,fg=#EEEEEE"
set -g status-left-length 256
set -g status-right-length 256
set -g status-left " #[fg=#DD4814,bold]#S #[default]| "
set -g status-right " #[fg=#EEEEEE]%Y-%m-%d %H:%M:%S "
set -g message-style "bg=#75507B,fg=white"

# Window list — byobu uses reverse video for current window
set -g window-status-style "bg=#333333,fg=#EEEEEE"
set -g window-status-current-style "bg=#333333,fg=#EEEEEE,reverse"
set -g window-status-activity-style "bg=#333333,fg=#EEEEEE,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator ""

# --- Pane borders (byobu accent/highlight) ---
set -g pane-border-style "fg=#75507B"
set -g pane-active-border-style "bg=#DD4814,fg=#DD4814"
set -g display-panes-colour "#75507B"
set -g display-panes-active-colour "#DD4814"
set -g clock-mode-colour "#75507B"

# Mode (copy mode) styling
set -g mode-style "bg=#75507B,fg=#EEEEEE"

# --- F-key bindings (byobu's core UX) ---
# F2: new window
bind -n F2 new-window -c "#{pane_current_path}"
# Ctrl-F2: vertical split (side by side)
bind -n C-F2 display-panes \; split-window -h -c "#{pane_current_path}"
# Shift-F2: horizontal split (stacked)
bind -n S-F2 display-panes \; split-window -v -c "#{pane_current_path}"
# Ctrl-Shift-F2: new session
bind -n C-S-F2 new-session

# F3/F4: previous/next window
bind -n F3 previous-window
bind -n F4 next-window
# Alt-Left/Right: previous/next window
bind -n M-Left previous-window
bind -n M-Right next-window
# Alt-Up/Down: previous/next session
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# Shift-F3/F4: previous/next pane
bind -n S-F3 display-panes \; select-pane -t :.-
bind -n S-F4 display-panes \; select-pane -t :.+
# Shift-Arrow: select pane by direction
bind -n S-Up display-panes \; select-pane -U
bind -n S-Down display-panes \; select-pane -D
bind -n S-Left display-panes \; select-pane -L
bind -n S-Right display-panes \; select-pane -R

# Ctrl-F3/F4: swap pane backward/forward
bind -n C-F3 display-panes \; swap-pane -s :. -t :.- \; select-pane -t :.-
bind -n C-F4 display-panes \; swap-pane -s :. -t :.+ \; select-pane -t :.+
# Ctrl-Shift-F3/F4: swap window backward/forward
bind -n C-S-F3 swap-window -t :-1 -d
bind -n C-S-F4 swap-window -t :+1 -d

# Alt-Shift-Arrow: resize pane
bind -n M-S-Up resize-pane -U
bind -n M-S-Down resize-pane -D
bind -n M-S-Left resize-pane -L
bind -n M-S-Right resize-pane -R

# F6: detach
bind -n F6 detach
# Ctrl-F6: kill pane
bind -n C-F6 kill-pane

# F7: copy mode (scrollback)
bind -n F7 copy-mode
# Alt-PgUp/PgDn: enter copy mode and scroll
bind -n M-NPage copy-mode \; send-keys NPage
bind -n M-PPage copy-mode \; send-keys PPage

# F8: rename window
bind -n F8 command-prompt -p "(rename-window) " "rename-window '%%'"
# Ctrl-F8: rename session
bind -n C-F8 command-prompt -p "(rename-session) " "rename-session '%%'"
# Shift-F8: cycle layouts
bind -n S-F8 next-layout

# Shift-F9: send command to all panes (synchronize toggle)
bind -n M-F9 display-panes \; setw synchronize-panes

# Alt-F11: break pane to its own window
bind -n M-F11 break-pane
# Ctrl-F11: join pane back
bind -n C-F11 join-pane -h -s :. -t :-1
# Shift-F11: zoom pane toggle
bind -n S-F11 resize-pane -Z

# Shift-F12: disable F-keys (pass-through to app)
bind -n S-F12 \
  unbind -n F2 \; unbind -n F3 \; unbind -n F4 \; \
  unbind -n F6 \; unbind -n F7 \; unbind -n F8 \; \
  display-message "Byobu F-keys: DISABLED (Shift-F12 to re-source)"

# --- Screen-like prefix bindings (Ctrl-A + key) ---
bind ^C new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind ^D detach
bind ^N next-window
bind n next-window
bind ^P previous-window
bind p previous-window
bind ^H previous-window
bind BSpace previous-window
bind space next-window
bind A command-prompt "rename-window %%"
bind ^W list-windows
bind w list-windows
bind K confirm-before "kill-window"
bind '\' confirm-before "kill-server"
bind * list-clients

# Splits (screen + byobu style)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Copy mode (vi) ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- TUI compatibility ---
set -gq allow-passthrough on
set -as terminal-features ',xterm-256color:sync'
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g set-clipboard on
set -g focus-events on
set -ag terminal-overrides ",xterm-256color:RGB:Tc"
# PageUp/PageDown passthrough for alternate screen apps
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

<!DOCTYPE html>
<html lang="en" data-theme="dark" class="fullbleed">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>RunKit</title>
    <meta name="description" content="Web-based agent orchestration dashboard" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="apple-touch-icon" href="/generated-icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Blocking theme initialization — runs before first paint to prevent flicker.
      // Reads user preference from localStorage and resolves to "dark" or "light".
      ;(function() {
        var pref = null;
        try { pref = localStorage.getItem("runkit-theme"); } catch(e) {}
        if (pref !== "light" && pref !== "dark" && pref !== "system") pref = "system";
        var resolved = pref;
        if (pref === "system") {
          resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = resolved;
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute('content', resolved === 'dark' ? '#0f1117' : '#f8f9fb');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/generated-icons/favicon.svg" />
  </head>
  <body class="h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

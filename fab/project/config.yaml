agent:
    tiers:
        default:
            effort: xhigh
            model: claude-fable-5
            provider: claude
        doing:
            effort: xhigh
            model: claude-opus-4-8
            provider: claude
        fast:
            effort: low
            model: claude-sonnet-5
            provider: claude
        operator:
            effort: medium
            model: claude-sonnet-5
            provider: claude
        review:
            effort: xhigh
            model: claude-fable-5
            provider: claude
checklist:
    extra_categories: []
fab_version: 2.13.5
project:
    description: Web based agent orchestration framework
    name: run-kit
providers:
    claude:
        session_command: claude --dangerously-skip-permissions -n "$(basename "$(pwd)")" --model {model} --effort {effort}
source_paths:
    - app/backend/
    - app/frontend/src/
    - app/frontend/tests/
test_paths:
    - '**/*_test.go'
    - '**/*.spec.ts'
    - '**/*.test.ts'
    - '**/*.spec.js'
    - '**/*.test.js'
true_impact_exclude:
    - fab/
    - docs/

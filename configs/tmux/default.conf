# run-kit tmux configuration
# Canonical source — copied to app/backend/build/tmux.conf at build time,
# embedded in the binary, and written to ~/.run-kit/tmux.conf on first run.

# --- General ---
set -g default-terminal "tmux-256color"
set -g mouse on
set -g escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1


# --- Prefix (Ctrl+S — avoids Ctrl+B conflict with Claude Code) ---
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix

# --- TUI compatibility ---
# Synchronized output — eliminates flicker in TUI apps
set -gq allow-passthrough on
set -as terminal-features ',xterm-256color:sync'

# Modifier key combos (Ctrl+Shift+key etc.) in TUI apps
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# OSC 52 clipboard — works across relay and nested tmux
set -g set-clipboard on

# Focus events — proper TUI focus tracking
set -g focus-events on

# True color (xterm-256color is the TERM used by the relay)
set -ag terminal-overrides ",xterm-256color:RGB:Tc"

# --- Status bar (themed via ANSI colour indices) ---
set -g status on
set -g status-style "bg=colour0,fg=colour7"
set -g status-left " #[fg=colour4,bold]#S #[default]"
set -g status-left-length 30
set -g status-right " #[fg=colour7]%H:%M "
set -g status-right-length 40

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour15,bg=colour4,bold] #I:#W #[default]"
set -g window-status-separator ""

# --- Pane borders ---
set -g pane-border-lines heavy
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"

# Pane status bar — shows command, path, git branch, worktree badge
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bg=colour4#,fg=colour15#,bold]  (#P/#D): #(echo #{pane_current_path} | rev | cut -d/ -f1-2 | rev) #[bg=colour3#,fg=colour15#,bold]#(cd #{pane_current_path} && git rev-parse --show-toplevel 2>/dev/null | grep -q "\.worktrees\|worktrees" && echo "   " || echo "")#[bg=colour8#,fg=colour7#,bold]  #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null | cut -c1-20) #[bg=colour2#,fg=colour7] #{pane_current_command} ,#[fg=colour8]  (#P/#D): #(echo #{pane_current_path} | rev | cut -d/ -f1-2 | rev) }'

# --- Keybindings (byobu-style) ---
bind -n F2 new-window
bind -n F3 previous-window
bind -n F4 next-window

# Pane management
bind \\ split-window -h
bind - split-window -v
bind -n S-F3 select-pane -t :.-
bind -n S-F4 select-pane -t :.+

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind -n S-F7 copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- User extensions (drop-in configs) ---
# Place *.conf files in ~/.rk/tmux.d/ to extend this config.
# Files are sourced in lexicographic order (use numeric prefixes for control).
source-file -q ~/.rk/tmux.d/*.conf

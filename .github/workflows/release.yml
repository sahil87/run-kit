name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # workflow_dispatch must run from main; tag-push is allowed from any ref.
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: create_tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "${{ inputs.bump }}"
          echo "tag=$(git tag --sort=-v:refname | head -1)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: app/backend/go.mod

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: cd app/frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd app/frontend && pnpm build

      - name: Copy frontend dist to backend embed directory
        run: |
          rm -rf app/backend/build/frontend
          cp -r app/frontend/dist app/backend/build/frontend
          touch app/backend/build/frontend/.gitkeep

      - name: Copy tmux config to backend embed directory
        run: cp configs/tmux/default.conf app/backend/build/tmux.conf

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ steps.create_tag.outputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile
        run: |
          cd app/backend
          mkdir -p ../../dist
          targets="darwin/arm64 darwin/amd64 linux/arm64 linux/amd64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="rk-${os}-${arch}"
            echo "Building ${output}..."
            mkdir -p "../../dist/${output}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" \
              -o "../../dist/${output}/rk" ./cmd/rk
            tar -czf "../../dist/${output}.tar.gz" -C "../../dist/${output}" rk
          done

      - name: Publish help tree to shll.ai
        env:
          SHLLAI_TOKEN: ${{ secrets.SHLLAI_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"

          # Emit the CLI help tree from the versioned linux/amd64 artifact so
          # the dumped version is the real release version (not "dev"). A failure
          # here (binary missing, dump errors, invalid JSON) is a real defect in
          # THIS repo's build, so it correctly fails the job under `bash -e`.
          mkdir -p help
          dist/rk-linux-amd64/rk help-dump help/run-kit.json
          jq empty help/run-kit.json

          # The cross-repo publish is best-effort: it runs AFTER the release
          # artifacts, GitHub Release, and Homebrew tap are already produced, so
          # a hiccup that is external to this repo (shll.ai unreachable, token
          # scope, repo-level auto-merge disabled, a same-version re-run whose
          # branch already exists, or an unchanged help tree) MUST NOT fail an
          # otherwise-successful release. We surface the outcome in the log and
          # leave the PR open for a manual merge if auto-merge is unavailable.
          publish_to_shllai() {
            # Open a PR (not a direct push) into sahil87/shll.ai with the
            # refreshed help tree, mirroring the Homebrew-tap token-clone pattern.
            git clone "https://x-access-token:${SHLLAI_TOKEN}@github.com/sahil87/shll.ai.git" /tmp/shll-ai || return 1

            branch="rk-help-dump-${version}"
            cp help/run-kit.json /tmp/shll-ai/help/run-kit.json

            cd /tmp/shll-ai
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            if [ -z "$(git status --porcelain help/run-kit.json)" ]; then
              echo "help/run-kit.json unchanged since last release — nothing to publish."
              return 0
            fi

            # --force-with-lease tolerates a re-dispatched release at the same
            # version (branch may already exist from a prior attempt).
            git checkout -B "$branch" || return 1
            git add help/run-kit.json
            git commit -m "rk help tree ${version}" || return 1
            git push --force-with-lease --set-upstream origin "$branch" || return 1

            # gh authenticates via GH_TOKEN; reuse the shll.ai token (contents +
            # pull-request write). Explicit arguments only — no untrusted
            # shell-string interpolation. If a PR for this head already exists,
            # `gh pr create` is a no-op error we tolerate before attempting merge.
            GH_TOKEN="$SHLLAI_TOKEN" gh pr create \
              --repo sahil87/shll.ai \
              --base main \
              --head "$branch" \
              --title "rk help tree ${version}" \
              --body "Automated help-tree update for rk ${version}." \
              || echo "PR for ${branch} may already exist; continuing to merge."

            # --auto requires repo-level "Allow auto-merge" on shll.ai. If that
            # is off, leave the PR open for a manual merge rather than failing.
            GH_TOKEN="$SHLLAI_TOKEN" gh pr merge "$branch" \
              --repo sahil87/shll.ai \
              --auto \
              --squash \
              || echo "Auto-merge unavailable for ${branch}; PR left open for manual merge."
          }

          if publish_to_shllai; then
            echo "shll.ai help-tree publish step completed."
          else
            echo "::warning::shll.ai help-tree publish failed (external to this repo); release is unaffected. PR was not opened — publish manually if needed."
          fi

      - name: Determine release notes base tag
        id: release-base
        run: |
          tag="${{ steps.version.outputs.tag }}"
          # Extract major.minor from current tag (e.g. v0.2.0 → 0.2)
          current_minor=$(echo "$tag" | sed 's/^v//' | cut -d. -f1-2)
          patch=$(echo "$tag" | sed 's/^v//' | cut -d. -f3)

          if [ "$patch" = "0" ]; then
            # Minor version bump — find the first tag of the previous minor version
            major=$(echo "$current_minor" | cut -d. -f1)
            minor=$(echo "$current_minor" | cut -d. -f2)
            prev_minor=$((minor - 1))
            prev_prefix="v${major}.${prev_minor}."
            # Get the earliest tag matching the previous minor version
            base_tag=$(git tag -l "${prev_prefix}*" --sort=version:refname | head -1)
            if [ -n "$base_tag" ]; then
              echo "base_tag=$base_tag" >> "$GITHUB_OUTPUT"
              echo "Using base tag: $base_tag (minor version release)"
            else
              echo "No previous minor version tags found, using default"
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*.tar.gz
          generate_release_notes: true
          previous_tag: ${{ steps.release-base.outputs.base_tag }}

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"

          sha_darwin_arm64=$(sha256sum dist/rk-darwin-arm64.tar.gz | cut -d' ' -f1)
          sha_darwin_amd64=$(sha256sum dist/rk-darwin-amd64.tar.gz | cut -d' ' -f1)
          sha_linux_arm64=$(sha256sum dist/rk-linux-arm64.tar.gz | cut -d' ' -f1)
          sha_linux_amd64=$(sha256sum dist/rk-linux-amd64.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sahil87/homebrew-tap.git" /tmp/homebrew-tap

          sed \
            -e "s/VERSION_PLACEHOLDER/${version}/" \
            -e "s/SHA_DARWIN_ARM64/${sha_darwin_arm64}/" \
            -e "s/SHA_DARWIN_AMD64/${sha_darwin_amd64}/" \
            -e "s/SHA_LINUX_ARM64/${sha_linux_arm64}/" \
            -e "s/SHA_LINUX_AMD64/${sha_linux_amd64}/" \
            .github/formula-template.rb > /tmp/homebrew-tap/Formula/rk.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rk.rb
          git commit -m "rk ${version}"
          git push

agent:
    spawn_command: claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"
checklist:
    extra_categories: []
fab_version: 1.4.0
project:
    description: Web based agent orchestration framework
    name: run-kit
review_tools:
    claude: true
    codex: true
    copilot: true
source_paths:
    - app/backend/
    - app/frontend/src/
stage_directives:
    apply: []
    hydrate: []
    intake: []
    review: []
    spec:
        - Use GIVEN/WHEN/THEN for scenarios
        - Mark ambiguities with [NEEDS CLARIFICATION]
    tasks: []

# run-kit tmux configuration
# Embedded in the binary — written to ~/.run-kit/tmux.conf on first run.

# --- General ---
set -g default-terminal "tmux-256color"
set -g mouse on
set -g escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# --- Prefix (explicit default) ---
set -g prefix C-b

# --- TUI compatibility ---
# Synchronized output — eliminates flicker in TUI apps
set -gq allow-passthrough on
set -as terminal-features ',xterm-256color:sync'

# Modifier key combos (Ctrl+Shift+key etc.) in TUI apps
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# OSC 52 clipboard — works across relay and nested tmux
set -g set-clipboard on

# Focus events — proper TUI focus tracking
set -g focus-events on

# True color (xterm-256color is the TERM used by the relay)
set -ag terminal-overrides ",xterm-256color:RGB:Tc"

# --- Status bar: dark theme ---
set -g status 2
set -g status-style "bg=#1a1d27,fg=#e8eaf0"
set -g status-left " #[fg=#5b8af0,bold]#S #[default]"
set -g status-left-length 30
set -g status-right " #[fg=#e8eaf0]%H:%M "
set -g status-right-length 40

# Second status line — pane list + active pane context
set -g status-format[1] "#[bg=#1a1d27,fg=#6b7280] P: #{P:#{?pane_active,#[fg=#5b8af0#,bold][#{pane_index}]#[default] ,#{pane_index} }}#[fg=#6b7280]#{pane_current_path} #[fg=#5b8af0]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null) #[fg=#e8eaf0]#{pane_current_command} "

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#0f1117,bg=#5b8af0,bold] #I:#W #[default]"
set -g window-status-separator ""

# --- Pane borders ---
set -g pane-border-lines heavy
set -g pane-border-style "fg=#2a2d37"
set -g pane-active-border-style "fg=#5b8af0"

# Pane status bar — shows command, path, git branch, worktree badge
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bg=#5b8af0#,fg=#0f1117#,bold] #P: #{pane_current_command} #[bg=#2a2d37#,fg=#e8eaf0] #{pane_current_path} #[bg=#2a2d37#,fg=#5b8af0#,bold] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo "") #[bg=#e8a84f#,fg=#0f1117#,bold]#(cd #{pane_current_path} && git rev-parse --show-toplevel 2>/dev/null | grep -q "\.worktrees\|worktrees" && echo " wt " || echo "") ,#[fg=#6b7280] #P: #{pane_current_command} }'

# --- Keybindings (byobu-style) ---
bind -n F2 new-window
bind -n F3 previous-window
bind -n F4 next-window

# Pane management
bind \ split-window -h
bind - split-window -v
bind -n S-F3 select-pane -t :.-
bind -n S-F4 select-pane -t :.+

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind -n S-F7 copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

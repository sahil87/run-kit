name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/backend/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: cd app/frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd app/frontend && pnpm build

      - name: Copy frontend dist to backend embed directory
        run: |
          rm -rf app/backend/build/frontend
          cp -r app/frontend/dist app/backend/build/frontend
          touch app/backend/build/frontend/.gitkeep

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile
        run: |
          cd app/backend
          mkdir -p ../../dist
          targets="darwin/arm64 darwin/amd64 linux/arm64 linux/amd64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="run-kit-${os}-${arch}"
            echo "Building ${output}..."
            mkdir -p "../../dist/${output}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags "-X main.version=${{ steps.version.outputs.version }}" \
              -o "../../dist/${output}/run-kit" ./cmd/run-kit
            tar -czf "../../dist/${output}.tar.gz" -C "../../dist/${output}" run-kit
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.BUILD_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"

          sha_darwin_arm64=$(sha256sum dist/run-kit-darwin-arm64.tar.gz | cut -d' ' -f1)
          sha_darwin_amd64=$(sha256sum dist/run-kit-darwin-amd64.tar.gz | cut -d' ' -f1)
          sha_linux_arm64=$(sha256sum dist/run-kit-linux-arm64.tar.gz | cut -d' ' -f1)
          sha_linux_amd64=$(sha256sum dist/run-kit-linux-amd64.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/wvrdz/homebrew-tap.git" /tmp/homebrew-tap

          sed \
            -e "s/VERSION_PLACEHOLDER/${version}/" \
            -e "s/SHA_DARWIN_ARM64/${sha_darwin_arm64}/" \
            -e "s/SHA_DARWIN_AMD64/${sha_darwin_amd64}/" \
            -e "s/SHA_LINUX_ARM64/${sha_linux_arm64}/" \
            -e "s/SHA_LINUX_AMD64/${sha_linux_amd64}/" \
            .github/formula-template.rb > /tmp/homebrew-tap/Formula/run-kit.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/run-kit.rb
          git commit -m "run-kit ${version}"
          git push
